# Drop in a model from anywhere by adding an entry.
#   provider: openai_compat  -> the openai SDK pointed at base_url (ollama, OpenAI,
#                               OpenRouter, any gateway). api_key_env optional (ollama
#                               ignores it). Model must serve /v1/chat/completions.
#   provider: anthropic      -> the anthropic SDK; requires api_key_env to be set.
models:
  - name: qwen2.5:72b
    provider: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5:72b
  - name: qwen2.5:14b
    provider: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5:14b
  - name: llama3.3
    provider: openai_compat
    base_url: http://localhost:11434/v1
    model: llama3.3:latest
  - name: gpt-4o
    provider: openai_compat
    base_url: https://api.openai.com/v1
    model: gpt-4o
    api_key_env: OPENAI_API_KEY
  # escalate: true -> held out of the routine jury; runs only on flagged/split rows as the
  # strong-tier tiebreak (audit/jury.py escalate). provider claude_cli shells out to the
  # `claude` CLI, which authenticates via the Claude Code subscription — no API key. It
  # reads CLAUDE_CODE_OAUTH_TOKEN in headless/launchd runs and the keychain interactively;
  # available whenever `claude` is on PATH. Bump to claude-opus-4-8 for the strongest
  # tiebreak. Confirm model ids via the claude-api skill.
  - name: claude
    provider: claude_cli
    model: claude-sonnet-5
    escalate: true
