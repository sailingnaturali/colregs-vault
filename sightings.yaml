version: 1
# ⚠️ UNVERIFIED DRAFT — pending Bryan's line-by-line review against the rule text.
# arrangement: ordered top -> bottom; all-round lights assumed.
patterns:
  - id: red-over-red-night
    arrangement: [red, red]
    condition: night
    mnemonic: "red over red, the captain is dead"
    candidates:
      - situation: not_under_command
        rule: "Rule 27(a)"
        note: "Two all-round reds in a vertical line."
      - situation: vessel_aground
        rule: "Rule 30(d)(i)"
        note: "Two all-round reds — if also showing anchor light(s) and not making way, aground."
      - situation: fishing
        rule: "Annex II 2(a)(iii)"
        note: "Two reds — a trawler with its net fast on an obstruction (with green-over-white)."
    confirm:
      - "Also see a white anchor light or two? May be AGROUND (Rule 30), not NUC."
      - "Sidelights + sternlight and moving -> making way; none/stationary -> stopped."
  - id: red-red-red-night
    arrangement: [red, red, red]
    condition: night
    candidates:
      - situation: constrained_by_draught
        rule: "Rule 28"
        note: "Three all-round reds in a vertical line."
  - id: red-white-red-night
    arrangement: [red, white, red]
    condition: night
    candidates:
      - situation: restricted_manoeuvrability
        rule: "Rule 27(b)"
        note: "Red-white-red all-round, vertical."
  - id: green-over-white-night
    arrangement: [green, white]
    condition: night
    mnemonic: "green over white, trawling at night"
    candidates:
      - situation: fishing
        rule: "Rule 26(b)"
        note: "Trawler: all-round green over all-round white."
    confirm:
      - "A fishing vessel shows these at anchor too; fishing lights do not imply making way."
  - id: red-over-white-night
    arrangement: [red, white]
    condition: night
    mnemonic: "red over white, fishing at night"
    candidates:
      - situation: fishing
        rule: "Rule 26(c)"
        note: "Fishing (not trawling): all-round red over all-round white."
    confirm:
      - "Order matters: WHITE over RED is a pilot vessel (Rule 29), not fishing."
      - "A fishing vessel shows these at anchor too; fishing lights do not imply making way."
  - id: white-over-red-night
    arrangement: [white, red]
    condition: night
    mnemonic: "white over red, pilot ahead"
    candidates:
      - situation: pilot_vessel
        rule: "Rule 29"
        note: "Pilot vessel on duty: all-round white over all-round red."
    confirm:
      - "Order matters: RED over WHITE is a fishing vessel (Rule 26), not a pilot."
  - id: anchor-white-night
    arrangement: [white]
    condition: night
    candidates:
      - situation: anchored
        rule: "Rule 30(b)"
        note: "Single all-round white forward (vessel under 50 m)."
  - id: anchor-ball-day
    arrangement: [ball]
    condition: day
    candidates:
      - situation: anchored
        rule: "Rule 30(a)"
        note: "One ball, forward."
  - id: ball-diamond-ball-day
    arrangement: [ball, diamond, ball]
    condition: day
    candidates:
      - situation: restricted_manoeuvrability
        rule: "Rule 27(b)"
        note: "Ball-diamond-ball in a vertical line."
  - id: ball-ball-day
    arrangement: [ball, ball]
    condition: day
    candidates:
      - situation: not_under_command
        rule: "Rule 27(a)"
        note: "Two balls in a vertical line."
  - id: cone-down-day
    arrangement: [cone_down]
    condition: day
    candidates:
      - situation: motorsailing
        rule: "Rule 25(e)"
        note: "One cone, apex down: sailing vessel also under power."
  - id: towing-masthead-2-night
    arrangement: [white, white]
    condition: night
    candidates:
      - situation: towing
        rule: "Rule 24(a)"
        note: "Two white masthead lights in a vertical line — towing, tow 200 m or less."
    confirm:
      - "Three whites in the vertical line → tow exceeds 200 m."
      - "Two whites that are fore-and-aft (forward higher) and stationary → a vessel 50 m+ at ANCHOR, not towing."
      - "Includes pushing ahead / towing alongside (Rule 24(c))."
  - id: towing-masthead-3-night
    arrangement: [white, white, white]
    condition: night
    candidates:
      - situation: towing
        rule: "Rule 24(a)(i)"
        note: "Three white masthead lights in a vertical line — tow exceeds 200 m."
  - id: towing-light-aft-night
    arrangement: [yellow, white]
    condition: night
    geometry: fore_and_aft
    mnemonic: "yellow over white, towing tonight"
    candidates:
      - situation: towing
        rule: "Rule 24(a)"
        note: "Yellow towing light directly above the white sternlight, seen from astern."
  - id: tow-diamond-day
    arrangement: [diamond]
    condition: day
    candidates:
      - situation: towing
        rule: "Rule 24(a)(v)"
        note: "Diamond shape — tow exceeds 200 m (shown by towing vessel and tow)."
      - situation: being_towed
        rule: "Rule 24(e)(ii)"
        note: "The towed vessel/object shows the same diamond."
  - id: minesweep-3-green-night
    arrangement: [green, green, green]
    condition: night
    geometry: triangle
    mnemonic: "three greens, mines unseen"
    candidates:
      - situation: mine_clearance
        rule: "Rule 27(f)"
        note: "Three all-round greens in a triangle — keep 1000 m clear."
  - id: minesweep-3-ball-day
    arrangement: [ball, ball, ball]
    condition: day
    geometry: triangle
    candidates:
      - situation: mine_clearance
        rule: "Rule 27(f)"
        note: "Three balls in a triangle (masthead + both yard-ends)."
  - id: aground-3-ball-day
    arrangement: [ball, ball, ball]
    condition: day
    candidates:
      - situation: vessel_aground
        rule: "Rule 30(d)(ii)"
        note: "Three balls in a VERTICAL line — aground."
    confirm:
      - "Three balls in a TRIANGLE → mine-clearance (Rule 27(f)), not aground."
  - id: anchored-two-white-night
    arrangement: [white, white]
    condition: night
    geometry: fore_and_aft
    candidates:
      - situation: anchored
        rule: "Rule 30(a)"
        note: "Forward (higher) and after (lower) anchor lights — vessel 50 m or more, at anchor."
    confirm:
      - "Two whites in a VERTICAL line → towing (Rule 24), not anchored."
  - id: air-cushion-night
    arrangement: [flashing_yellow]
    condition: night
    candidates:
      - situation: air_cushion
        rule: "Rule 23(b)"
        note: "All-round flashing yellow (in addition to ordinary power-driven lights)."
  - id: wig-night
    arrangement: [flashing_red]
    condition: night
    candidates:
      - situation: wig
        rule: "Rule 23(c)"
        note: "High-intensity all-round flashing red — WIG craft taking off, landing, or in flight."
  - id: sailing-red-over-green-night
    arrangement: [red, green]
    condition: night
    mnemonic: "red over green, sailing machine"
    candidates:
      - situation: sailing
        rule: "Rule 25(c)"
        note: "Optional all-round red over green at the masthead (with sidelights + sternlight below)."
  - id: cbd-cylinder-day
    arrangement: [cylinder]
    condition: day
    candidates:
      - situation: constrained_by_draught
        rule: "Rule 28"
        note: "A cylinder — constrained by draught."
  - id: fishing-cones-day
    arrangement: [cone_down, cone_up]
    condition: day
    candidates:
      - situation: fishing
        rule: "Rule 26(c)(i)"
        note: "Two cones with apexes together (upper apex down, lower apex up)."
  - id: fishing-gear-cone-up-day
    arrangement: [cone_up]
    condition: day
    candidates:
      - situation: fishing
        rule: "Rule 26(c)(ii)"
        note: "A single cone apex-up shown toward outlying gear extending over 150 m."
  - id: fishing-shooting-night
    arrangement: [white, white]
    condition: night
    candidates:
      - situation: fishing
        rule: "Annex II 2(a)(i)"
        note: "Two whites in a vertical line — trawler shooting nets (in addition to green-over-white)."
    confirm:
      - "Also showing green-over-white → confirms a trawler. Vertical whites with a towing config → towing."
  - id: fishing-hauling-night
    arrangement: [white, red]
    condition: night
    candidates:
      - situation: fishing
        rule: "Annex II 2(a)(ii)"
        note: "White over red — trawler hauling nets (in addition to green-over-white)."
    confirm:
      - "On a pilot station with no trawling lights → pilot vessel (Rule 29), not hauling."
  - id: fishing-purse-seine-night
    arrangement: [flashing_yellow, flashing_yellow]
    condition: night
    candidates:
      - situation: fishing
        rule: "Annex II 3"
        note: "Two yellow lights flashing alternately every second — purse-seiner hampered by its gear."
