version: 1

entries:
  - id: anchored-under-50m-night
    match: { situation: anchored, condition: night, length_lt: 50 }
    lights: [{ id: anchor_light, desc: "all-round white, where best seen", rule: "Rule 30(b)" }]
    forbids: [sidelights, sternlight, masthead_steaming, tricolor]
  - id: anchored-under-50m-day
    match: { situation: anchored, condition: day, length_lt: 50 }
    shapes: [{ id: ball, desc: "one ball, forward", rule: "Rule 30(a)" }]
  - id: power-under-50m-night
    match: { situation: power_driven, condition: night, length_lt: 50 }
    lights:
      - { id: masthead_steaming, desc: "masthead light, forward", rule: "Rule 23(a)(i)" }
      - { id: sidelights, desc: "red port / green starboard", rule: "Rule 23(a)(iii)" }
      - { id: sternlight, desc: "white sternlight", rule: "Rule 23(a)(iv)" }
    forbids: [tricolor]
  - id: motorsailing-night
    match: { situation: motorsailing, condition: night }
    lights:
      - { id: masthead_steaming, desc: "masthead light, forward", rule: "Rule 25(e)+23(a)" }
      - { id: sidelights, desc: "red port / green starboard", rule: "Rule 23(a)(iii)" }
      - { id: sternlight, desc: "white sternlight", rule: "Rule 23(a)(iv)" }
    forbids: [tricolor]
  - id: motorsailing-day
    match: { situation: motorsailing, condition: day }
    shapes: [{ id: cone_apex_down, desc: "conical shape, apex downwards, forward", rule: "Rule 25(e)" }]
  - id: sailing-under-20m-night
    match: { situation: sailing, condition: night, length_lt: 20 }
    light_options:
      - [{ id: sidelights, desc: "red/green", rule: "Rule 25(a)" }, { id: sternlight, desc: "white", rule: "Rule 25(a)" }]
      - [{ id: tricolor, desc: "combined masthead tricolor", rule: "Rule 25(b)" }]
    forbids: [masthead_steaming]
  - id: not-under-command-night
    match: { situation: not_under_command, condition: night }
    lights:
      - { id: all_round_red_upper, desc: "all-round red", rule: "Rule 27(a)(i)" }
      - { id: all_round_red_lower, desc: "all-round red, below the first", rule: "Rule 27(a)(i)" }
  - id: constrained-by-draught-night
    match: { situation: constrained_by_draught, condition: night }
    lights:
      - { id: all_round_red_1, desc: "all-round red", rule: "Rule 28" }
      - { id: all_round_red_2, desc: "all-round red", rule: "Rule 28" }
      - { id: all_round_red_3, desc: "all-round red", rule: "Rule 28" }
  - id: restricted-manoeuvrability-night
    match: { situation: restricted_manoeuvrability, condition: night }
    lights:
      - { id: all_round_red_upper, desc: "all-round red, uppermost", rule: "Rule 27(b)(i)" }
      - { id: all_round_white_middle, desc: "all-round white, middle", rule: "Rule 27(b)(i)" }
      - { id: all_round_red_lower, desc: "all-round red, lowest", rule: "Rule 27(b)(i)" }
  - id: restricted-manoeuvrability-day
    match: { situation: restricted_manoeuvrability, condition: day }
    shapes:
      - { id: ball, desc: "ball, uppermost", rule: "Rule 27(b)(ii)" }
      - { id: diamond, desc: "diamond, middle", rule: "Rule 27(b)(ii)" }
      - { id: ball, desc: "ball, lowest", rule: "Rule 27(b)(ii)" }
  - id: not-under-command-day
    match: { situation: not_under_command, condition: day }
    shapes:
      - { id: ball, desc: "ball, upper", rule: "Rule 27(a)(ii)" }
      - { id: ball, desc: "ball, lower", rule: "Rule 27(a)(ii)" }
  - id: fishing-night
    match: { situation: fishing, condition: night }
    light_options:
      - [{ id: all_round_green_upper, desc: "all-round green over white — trawling", rule: "Rule 26(b)(i)" }, { id: all_round_white_lower, desc: "all-round white", rule: "Rule 26(b)(i)" }]
      - [{ id: all_round_red_upper, desc: "all-round red over white — fishing other than trawling", rule: "Rule 26(c)(i)" }, { id: all_round_white_lower, desc: "all-round white", rule: "Rule 26(c)(i)" }]
  - id: pilot-vessel-night
    match: { situation: pilot_vessel, condition: night }
    lights:
      - { id: all_round_white_upper, desc: "all-round white, uppermost", rule: "Rule 29(a)(i)" }
      - { id: all_round_red_lower, desc: "all-round red, below the white", rule: "Rule 29(a)(i)" }
  - id: towing-masthead-night
    match: { situation: towing, condition: night }
    light_options:
      - [{ id: masthead_white_1, token: white, desc: "masthead light, forward", rule: "Rule 24(a)(i)" }, { id: masthead_white_2, token: white, desc: "masthead light below the first (vertical line)", rule: "Rule 24(a)(i)" }]
      - [{ id: masthead_white_1, token: white, desc: "masthead light, forward", rule: "Rule 24(a)(i)" }, { id: masthead_white_2, token: white, desc: "second masthead light", rule: "Rule 24(a)(i)" }, { id: masthead_white_3, token: white, desc: "third masthead light (tow exceeds 200 m)", rule: "Rule 24(a)(i)" }]
  - id: towing-stern-night
    match: { situation: towing, condition: night }
    lights:
      - { id: towing_light, token: yellow, desc: "yellow towing light above the sternlight", rule: "Rule 24(a)(iv)" }
      - { id: sternlight, token: white, desc: "sternlight", rule: "Rule 24(a)(iii)" }
  - id: towing-day-over-200m
    match: { situation: towing, condition: day }
    shapes:
      - { id: diamond, desc: "diamond where best seen — tow exceeds 200 m", rule: "Rule 24(a)(v)" }
  - id: being-towed-day-over-200m
    match: { situation: being_towed, condition: day }
    shapes:
      - { id: diamond, desc: "diamond where best seen — tow exceeds 200 m", rule: "Rule 24(e)(ii)" }
  - id: mine-clearance-night
    match: { situation: mine_clearance, condition: night }
    lights:
      - { id: all_round_green_masthead, desc: "all-round green at the foremast head", rule: "Rule 27(f)" }
      - { id: all_round_green_yard_1, desc: "all-round green, one end of the fore yard", rule: "Rule 27(f)" }
      - { id: all_round_green_yard_2, desc: "all-round green, other end of the fore yard", rule: "Rule 27(f)" }
  - id: mine-clearance-day
    match: { situation: mine_clearance, condition: day }
    shapes:
      - { id: ball_masthead, token: ball, desc: "ball at the foremast head", rule: "Rule 27(f)" }
      - { id: ball_yard_1, token: ball, desc: "ball, one end of the fore yard", rule: "Rule 27(f)" }
      - { id: ball_yard_2, token: ball, desc: "ball, other end of the fore yard", rule: "Rule 27(f)" }
  - id: aground-night
    match: { situation: vessel_aground, condition: night }
    lights:
      - { id: all_round_red_upper, desc: "all-round red", rule: "Rule 30(d)(i)" }
      - { id: all_round_red_lower, desc: "all-round red, below the first", rule: "Rule 30(d)(i)" }
      - { id: anchor_light, token: null, desc: "anchor light(s) also shown (context, not part of the two-red signal)", rule: "Rule 30(d)" }
  - id: aground-day
    match: { situation: vessel_aground, condition: day }
    shapes:
      - { id: ball_upper, token: ball, desc: "ball, uppermost", rule: "Rule 30(d)(ii)" }
      - { id: ball_middle, token: ball, desc: "ball, middle", rule: "Rule 30(d)(ii)" }
      - { id: ball_lower, token: ball, desc: "ball, lowest", rule: "Rule 30(d)(ii)" }
  - id: anchored-over-50m-night
    match: { situation: anchored, condition: night, length_gte: 50 }
    lights:
      - { id: anchor_light_forward, token: white, desc: "forward anchor light, higher", rule: "Rule 30(a)(i)" }
      - { id: anchor_light_aft, token: white, desc: "after anchor light, lower", rule: "Rule 30(a)(ii)" }
  - id: air-cushion-night
    match: { situation: air_cushion, condition: night }
    lights:
      - { id: flashing_yellow_allround, token: flashing_yellow, desc: "all-round flashing yellow (non-displacement mode)", rule: "Rule 23(b)" }
  - id: wig-night
    match: { situation: wig, condition: night }
    lights:
      - { id: flashing_red_hi_intensity, token: flashing_red, desc: "high-intensity all-round flashing red (taking off / landing / in flight)", rule: "Rule 23(c)" }
  - id: sailing-masthead-night
    match: { situation: sailing, condition: night }
    lights:
      - { id: all_round_red_masthead, desc: "all-round red at the masthead", rule: "Rule 25(c)" }
      - { id: all_round_green_masthead_low, desc: "all-round green below the red", rule: "Rule 25(c)" }
  - id: constrained-by-draught-day
    match: { situation: constrained_by_draught, condition: day }
    shapes:
      - { id: cylinder, desc: "cylinder where best seen", rule: "Rule 28" }
  - id: fishing-day
    match: { situation: fishing, condition: day }
    shapes:
      - { id: cone_apex_down, desc: "upper cone, apex downward", rule: "Rule 26(c)(i)" }
      - { id: cone_apex_up, desc: "lower cone, apex upward (apexes together)", rule: "Rule 26(c)(i)" }
  - id: fishing-gear-day
    match: { situation: fishing, condition: day }
    shapes:
      - { id: cone_apex_up, desc: "cone, apex up, toward outlying gear (gear extends over 150 m)", rule: "Rule 26(c)(ii)" }
  - id: fishing-annex2-night
    match: { situation: fishing, condition: night }
    light_options:
      - [{ id: shoot_white_1, token: white, desc: "two white in a vertical line — shooting nets", rule: "Annex II 2(a)(i)" }, { id: shoot_white_2, token: white, desc: "lower white", rule: "Annex II 2(a)(i)" }]
      - [{ id: haul_white, token: white, desc: "white over red — hauling nets", rule: "Annex II 2(a)(ii)" }, { id: haul_red, token: red, desc: "lower red", rule: "Annex II 2(a)(ii)" }]
      - [{ id: netfast_red_1, token: red, desc: "two red in a vertical line — net fast on an obstruction", rule: "Annex II 2(a)(iii)" }, { id: netfast_red_2, token: red, desc: "lower red", rule: "Annex II 2(a)(iii)" }]
      - [{ id: purse_yellow_1, token: flashing_yellow, desc: "two yellow flashing alternately — purse-seine hampered by gear", rule: "Annex II 3" }, { id: purse_yellow_2, token: flashing_yellow, desc: "lower yellow", rule: "Annex II 3" }]
